spring:
  application:
    name: "configserver"
  profiles:
    # active: native
    active: git
  cloud:
    config:
      server:
        # native:
        # search-locations: "classpath:/config"
        # search-locations: "file:///Users//eazybytes//Documents//config"
        git:
          uri: "https://github.com/raysoumita1999-ai/microservice-config.git"
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true
          search-paths:
            - "accounts/src/main/resources/config"

server:
  port: 8071